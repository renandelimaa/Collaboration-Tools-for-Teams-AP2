name: Zensical CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '0 0 * * 0' # Roda todo domingo à meia-noite

# Estas permissões são OBRIGATÓRIAS para o GitHub Pages moderno funcionar
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build_site:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - name: Checkout do código 📑
        uses: actions/checkout@v4

      - name: Configurar Python ${{ matrix.python-version }} 🐍
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache do Pip 💾
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}

      - name: Instalar dependências e Zensical 🛠️
        run: |
          python -m pip install --upgrade pip
          pip install zensical

      - name: Build do site com Zensical 🏗️
        run: zensical build

      # Upload usando a Action OFICIAL do GitHub Pages exigida na AP2
      - name: Upload do Artefato HTML 📦
        if: matrix.python-version == '3.11' # Só precisamos subir o site uma vez
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/ 

  deploy_site:
    runs-on: ubuntu-latest
    needs: build_site # Aguarda a conclusão do build
    if: github.event_name != 'pull_request' # Nunca corre num PR (Regra da AP2)
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy para o GitHub Pages 🚀
        id: deployment
        uses: actions/deploy-pages@v4
