name: Zensical CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '0 0 * * 0' # Roda todo domingo à meia-noite

jobs:
  build_site:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - name: Checkout do código 📑
        uses: actions/checkout@v4

      - name: Configurar Python ${{ matrix.python-version }} 🐍
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache do Pip 💾
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Instalar dependências e Zensical 🛠️
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; else pip install zensical; fi

      - name: Build do site com Zensical 🏗️
        run: zensical build

      - name: Upload do Artefato HTML 📦
        uses: actions/upload-artifact@v4
        with:
          name: site-html-${{ matrix.python-version }}
          path: site/ # Altere aqui se a pasta de saída do Zensical tiver outro nome

  deploy_site:
    runs-on: ubuntu-latest
    needs: build_site
    if: github.event_name != 'pull_request' # Garante a segurança exigida
    steps:
      - name: Checkout do código 📑
        uses: actions/checkout@v4

      - name: Download do Artefato 📥
        uses: actions/download-artifact@v4
        with:
          name: site-html-3.11 # Usa o HTML gerado pela versão 3.11 do Python
          path: public/

      - name: Deploy para o GitHub Pages 🚀
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
